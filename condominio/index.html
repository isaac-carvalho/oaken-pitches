<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oaken IA · Condomínio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f8fc; --panel:#ffffff; --panel-2:#eef0f8; --line:#e3e5f0;
    --ink:#1a1a2e; --ink-soft:#5a5a7a; --ink-mute:#9a9ab5;
    --accent:#6d5cf5; --cyan:#0ea5e9;
    --grad:linear-gradient(135deg,#7b5cf5,#22a8e8);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    display:flex;flex-direction:column;overflow:hidden;}
  .topbar{display:flex;align-items:center;gap:14px;padding:12px 20px;background:var(--panel);
    border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    color:#fff;font-family:'Fraunces',serif;font-weight:600;font-size:19px;background:var(--grad);}
  .brand-name{font-family:'Fraunces',serif;font-weight:600;font-size:18px;letter-spacing:-.01em;line-height:1;}
  .brand-tag{font-size:10px;color:var(--ink-mute);letter-spacing:.14em;text-transform:uppercase;margin-top:2px;}
  .spacer{flex:1;}
  .wa{display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-size:13px;font-weight:700;
    color:#fff;background:var(--grad);padding:9px 16px;border-radius:9px;}
  .wa:hover{filter:brightness(1.05);}
  .nav{display:flex;gap:8px;padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--line);overflow-x:auto;}
  .nav button{font-family:inherit;font-size:14px;font-weight:600;color:var(--ink-soft);background:var(--panel-2);
    border:1px solid var(--line);border-radius:10px;padding:11px 20px;cursor:pointer;white-space:nowrap;
    display:inline-flex;align-items:center;gap:9px;transition:all .12s;}
  .nav button:hover{color:var(--ink);border-color:var(--accent);}
  .nav button.active{color:#fff;background:var(--grad);border-color:transparent;box-shadow:0 4px 14px rgba(109,92,245,.3);}
  .nav button .ic{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;}
  .stage{flex:1;position:relative;background:var(--bg);}
  .stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff;}
  .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--ink-mute);font-size:14px;gap:10px;}
  .loading .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  @media(max-width:600px){
    .brand-name{font-size:16px;} .nav button{font-size:13px;padding:10px 15px;}
    .wa{padding:8px 13px;font-size:12px;} .nav{padding:10px 14px;}
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">O</div>
      <div><div class="brand-name">Oaken IA</div><div class="brand-tag">Condomínio</div></div>
    </div>
    <div class="spacer"></div>
    <a class="wa" href="https://wa.me/351913388794?text=Ol%C3%A1%2C%20vi%20a%20proposta%20da%20Oaken%20IA%20%28Condom%C3%ADnio%29%20e%20gostaria%20de%20conversar." target="_blank" rel="noopener">Falar no WhatsApp &rarr;</a>
  </div>

  <nav class="nav">
    <button data-src="../condominio-pitch.html" class="active">
      <svg class="ic" viewBox="0 0 24 24"><path d="M5 3h10l4 4v14H5zM15 3v4h4M8 12h8M8 16h6"/></svg>
      Proposta
    </button>
    <button data-src="../painel-condominio-demo.html">
      <svg class="ic" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      Ver a demonstra&ccedil;&atilde;o
    </button>
    <button data-src="../onboarding/form-condominio.html">
      <svg class="ic" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Come&ccedil;ar (formul&aacute;rio)
    </button>
  </nav>

  <div class="stage">
    <div class="loading" id="loading"><span class="dot"></span> Carregando&hellip;</div>
    <iframe id="frame" src="../condominio-pitch.html" title="Conte&uacute;do" onload="document.getElementById('loading').style.display='none'"></iframe>
  </div>

<script>
  var frame=document.getElementById('frame'), loading=document.getElementById('loading');
  document.querySelectorAll('.nav button').forEach(function(b){
    b.addEventListener('click',function(){
      if(b.classList.contains('active')) return;
      document.querySelectorAll('.nav button').forEach(function(x){x.classList.remove('active');});
      b.classList.add('active');
      loading.style.display='flex';
      frame.src=b.getAttribute('data-src');
    });
  });
</script>

</body>
</html>
